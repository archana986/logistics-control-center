# =============================================================================
# Databricks App Configuration - Logistics Control Center
# =============================================================================
# This file defines how the Databricks App runs in the workspace.
#
# Architecture:
#   - React frontend (Vite build → static files)
#   - Python FastAPI backend (API, AI agents, database queries)
#   - Gunicorn + Uvicorn (production ASGI server)
#
# Startup Sequence:
#   1. pip install -r requirements.txt
#   2. npm install && npm run build
#   3. gunicorn starts FastAPI on port 8000
#
# SETUP: Update the environment variables below with your values.
#        See SETUP.md for detailed instructions.
# =============================================================================

command: 
  - "sh"
  - "-c"
  - |
    pip install -r requirements.txt && \
    npm install && \
    npm run build && \
    gunicorn backend.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000

env:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build Configuration (usually no changes needed)
  # ─────────────────────────────────────────────────────────────────────────────
  - name: NODE_ENV
    value: production
  - name: VITE_BACKEND_URL
    value: /api

  # ─────────────────────────────────────────────────────────────────────────────
  # AI Model Configuration (OPTIONAL: Change to use a different model)
  # ─────────────────────────────────────────────────────────────────────────────
  # Foundation Model for generating customer communications (reroute suggestions,
  # customer update drafts, incident analysis). Change the value below to any
  # Foundation Model API pay-per-token endpoint available in your workspace.
  # To see available endpoints: Workspace UI → Serving → Foundation Model APIs
  - name: DATABRICKS_MODEL_ENDPOINT
    value: databricks-llama-4-maverick

  # ─────────────────────────────────────────────────────────────────────────────
  # Unity Catalog Configuration (STEP 2: Update these)
  # ─────────────────────────────────────────────────────────────────────────────
  - name: DATABRICKS_SQL_WAREHOUSE_ID
    value: "<YOUR_WAREHOUSE_ID>"               # Same as databricks.yml
  - name: DATABRICKS_CATALOG
    value: "<YOUR_CATALOG>"                    # Same as databricks.yml
  - name: DATABRICKS_SCHEMA
    value: "logistics_control_center"

  # ─────────────────────────────────────────────────────────────────────────────
  # Agent Configuration (STEP 5: Update after running setup job)
  # ─────────────────────────────────────────────────────────────────────────────
  - name: DATABRICKS_GENIE_SPACE_ID
    value: ""                                  # From setup job output
  - name: DATABRICKS_KA_ENDPOINT
    value: ""                                  # From setup job output
  - name: DATABRICKS_SUPERVISOR_ENDPOINT
    value: ""
