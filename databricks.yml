# =============================================================================
# Databricks Asset Bundle - Logistics Control Center
# =============================================================================
# AI-powered logistics incident response application with:
#   - Real-time streaming data pipeline (Bronze/Silver/Gold)
#   - Genie Space for natural language analytics
#   - Knowledge Assistant for document Q&A
#   - React + FastAPI application
#
# QUICK START: See SETUP.md for step-by-step deployment instructions.
# =============================================================================

bundle:
  name: logistics-control-center

# Sync only production files to workspace (excludes docs, tests, local configs)
sync:
  exclude:
    - "_archive/**"
    - ".local/**"
    - ".git/**"
    - ".gitignore"
    - ".databricks/**"
    - "node_modules/**"
    - "dist/**"
    - "*.md"
    - "*.png"
    - "*.mmd"
    - "env.example"

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

# =============================================================================
# VARIABLES - Customer Configuration
# =============================================================================
# These variables are used throughout the bundle. Update them in the 'targets'
# section below to match your Databricks workspace.
# =============================================================================
variables:
  warehouse_id:
    description: SQL Warehouse ID for running queries and SQL tasks
    default: "<YOUR_WAREHOUSE_ID>"
  catalog:
    description: Unity Catalog catalog name (you must have CREATE SCHEMA permission)
    default: "<YOUR_CATALOG>"
  schema:
    description: Schema name for logistics tables (will be created if not exists)
    default: "logistics_control_center"
  genie_space_id:
    description: Genie Space ID (populated after running setup job - Phase 2)
    default: ""
  ka_endpoint:
    description: Knowledge Assistant endpoint name (populated after setup job - Phase 2)
    default: ""
  supervisor_endpoint:
    description: Multi-agent supervisor endpoint (optional, for advanced scenarios)
    default: ""

# =============================================================================
# TARGETS - Deployment Environments
# =============================================================================
# Configure each target with your workspace settings. The 'dev' target is the
# default for local development and testing.
# =============================================================================
targets:
  dev:
    mode: development
    default: true
    workspace:
      # ╔═══════════════════════════════════════════════════════════════════════╗
      # ║ CUSTOMER: Replace with your Databricks CLI profile name               ║
      # ║ Run 'databricks auth profiles' to list available profiles             ║
      # ╚═══════════════════════════════════════════════════════════════════════╝
      profile: <YOUR_DATABRICKS_PROFILE>
    variables:
      # ╔═══════════════════════════════════════════════════════════════════════╗
      # ║ CUSTOMER: Update these values for your workspace                       ║
      # ╚═══════════════════════════════════════════════════════════════════════╝
      warehouse_id: "<YOUR_WAREHOUSE_ID>"      # SQL Warehouses > Copy ID
      catalog: "<YOUR_CATALOG>"                 # Must have CREATE SCHEMA permission
      schema: "logistics_control_center"
      # ╔═══════════════════════════════════════════════════════════════════════╗
      # ║ PHASE 2: Update these after running 'logistics_setup' job             ║
      # ║ Values are printed in the job output                                   ║
      # ╚═══════════════════════════════════════════════════════════════════════╝
      genie_space_id: ""
      ka_endpoint: ""

  # Production target (uncomment and configure when ready)
  # prod:
  #   mode: production
  #   workspace:
  #     profile: <YOUR_PROD_PROFILE>
  #   variables:
  #     warehouse_id: "<YOUR_PROD_WAREHOUSE_ID>"
  #     catalog: "<YOUR_PROD_CATALOG>"
  #     schema: "logistics_control_center"
  #     genie_space_id: "<YOUR_PROD_GENIE_SPACE_ID>"
  #     ka_endpoint: "<YOUR_PROD_KA_ENDPOINT>"

# =============================================================================
# RESOURCES
# =============================================================================

resources:
  # ===========================================================================
  # DATABRICKS APP (Deploy in Phase 3)
  # ===========================================================================
  # Prerequisites before uncommenting:
  #   1. Complete Phase 2 (run logistics_setup job)
  #   2. Get genie_space_id and ka_endpoint from job output
  #   3. Update targets.dev.variables with those values
  #   4. Uncomment this section
  #   5. Run: databricks bundle deploy -t dev
  #   6. Run: databricks bundle run logistics_app_permissions -t dev
  # ===========================================================================
  # apps:
  #   logistics_control_center_app:
  #     name: logistics-incident-response
  #     description: "Logistics Control Center - AI-powered incident response"
  #     source_code_path: .
  #     resources:
  #       - name: app-sql-warehouse
  #         sql_warehouse:
  #           id: ${var.warehouse_id}
  #           permission: CAN_USE
  #       - name: app-genie-space
  #         genie_space:
  #           name: "Logistics Control Center Metrics"
  #           space_id: ${var.genie_space_id}
  #           permission: CAN_RUN
  #       - name: app-ka-endpoint
  #         serving_endpoint:
  #           name: ${var.ka_endpoint}
  #           permission: CAN_QUERY

  # ===========================================================================
  # STREAMING PIPELINE - Bronze/Silver/Gold Data Processing
  # ===========================================================================
  pipelines:
    logistics_streaming_pipeline:
      name: logistics-control-center-streaming
      catalog: ${var.catalog}
      schema: ${var.schema}
      development: true
      channel: CURRENT
      continuous: false
      serverless: true
      configuration:
        catalog: ${var.catalog}
        schema: ${var.schema}
      libraries:
        - file:
            path: databricks/pipelines/01_bronze.sql
        - file:
            path: databricks/pipelines/02_silver.sql
        - file:
            path: databricks/pipelines/03_gold.sql

  # ===========================================================================
  # JOBS
  # ===========================================================================
  jobs:
    # -------------------------------------------------------------------------
    # SETUP JOB - Run this first (Phase 2)
    # -------------------------------------------------------------------------
    # Creates all data, tables, agents, and AI components.
    # Run with: databricks bundle run logistics_setup -t dev
    # -------------------------------------------------------------------------
    logistics_setup:
      name: logistics-control-center-setup
      max_concurrent_runs: 1
      timeout_seconds: 3600
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
      tasks:
        - task_key: create_foundation
          description: Create schema, volumes, and serving/raw tables
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: databricks/notebooks/setup_tables.sql
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: generate_synthetic_data
          description: Seed synthetic logistics data and raw event files
          depends_on:
            - task_key: create_foundation
          notebook_task:
            notebook_path: databricks/notebooks/generate_synthetic_data.ipynb
            source: WORKSPACE

        - task_key: run_pipeline_update
          description: Run pipeline to process raw events into gold views
          depends_on:
            - task_key: generate_synthetic_data
          pipeline_task:
            pipeline_id: ${resources.pipelines.logistics_streaming_pipeline.id}

        - task_key: refresh_serving_tables
          description: Sync gold outputs to serving Delta tables
          depends_on:
            - task_key: run_pipeline_update
          notebook_task:
            notebook_path: databricks/notebooks/refresh_serving_tables.ipynb
            source: WORKSPACE

        - task_key: create_helper_metric_views
          description: Create helper and metric views for Genie/backend
          depends_on:
            - task_key: refresh_serving_tables
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: databricks/notebooks/create_helper_metric_views.sql
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: generate_documents
          description: Generate synthetic KA documents in UC volume
          depends_on:
            - task_key: create_foundation
          notebook_task:
            notebook_path: databricks/notebooks/generate_documents.ipynb
            source: WORKSPACE

        - task_key: reroute_optimization_seed
          description: Generate initial reroute candidates
          depends_on:
            - task_key: refresh_serving_tables
          notebook_task:
            notebook_path: databricks/notebooks/run_reroute_optimization.ipynb
            source: WORKSPACE

        - task_key: create_genie_space
          description: Create or update Genie space from metric views
          depends_on:
            - task_key: create_helper_metric_views
          notebook_task:
            notebook_path: databricks/notebooks/create_genie_space.ipynb
            source: WORKSPACE

        - task_key: create_knowledge_assistant
          description: Create or update Knowledge Assistant from generated docs
          depends_on:
            - task_key: generate_documents
          notebook_task:
            notebook_path: databricks/notebooks/create_knowledge_assistant.ipynb
            source: WORKSPACE

    # -------------------------------------------------------------------------
    # STREAMING REFRESH JOB - Scheduled data updates
    # -------------------------------------------------------------------------
    logistics_streaming_refresh:
      name: logistics-control-center-streaming-refresh
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 */5 * * * ?"
        timezone_id: "UTC"
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
      tasks:
        - task_key: append_raw_events
          description: Append incremental events to UC volume landing zones
          notebook_task:
            notebook_path: databricks/notebooks/stream_events_to_volume.ipynb
            source: WORKSPACE

        - task_key: run_pipeline_update
          description: Trigger declarative pipeline update
          depends_on:
            - task_key: append_raw_events
          pipeline_task:
            pipeline_id: ${resources.pipelines.logistics_streaming_pipeline.id}

        - task_key: refresh_serving_tables
          description: Sync gold outputs to serving Delta tables
          depends_on:
            - task_key: run_pipeline_update
          notebook_task:
            notebook_path: databricks/notebooks/refresh_serving_tables.ipynb
            source: WORKSPACE

        - task_key: reroute_optimization_refresh
          description: Refresh reroute suggestions from current incident/capacity state
          depends_on:
            - task_key: refresh_serving_tables
          notebook_task:
            notebook_path: databricks/notebooks/run_reroute_optimization.ipynb
            source: WORKSPACE

    # -------------------------------------------------------------------------
    # APP PERMISSIONS JOB - Run after app deployment (Phase 3)
    # -------------------------------------------------------------------------
    # Grants the app's service principal access to Unity Catalog.
    # Run with: databricks bundle run logistics_app_permissions -t dev
    # -------------------------------------------------------------------------
    logistics_app_permissions:
      name: logistics-control-center-app-permissions
      max_concurrent_runs: 1
      timeout_seconds: 600
      parameters:
        - name: app_name
          # Uncomment the line below after uncommenting the apps section
          # default: ${resources.apps.logistics_control_center_app.name}
          default: "logistics-incident-response"
        - name: warehouse_id
          default: ${var.warehouse_id}
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
      tasks:
        - task_key: grant_app_uc_permissions
          description: Grant app service principal access to Unity Catalog
          notebook_task:
            notebook_path: databricks/notebooks/grant_app_permissions.ipynb
            source: WORKSPACE
