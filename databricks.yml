# =============================================================================
# Databricks Asset Bundle - Logistics Control Center
# =============================================================================
# AI-powered logistics incident response application with:
#   - Real-time streaming data pipeline (Bronze/Silver/Gold)
#   - Genie Space for natural language analytics
#   - Knowledge Assistant for document Q&A
#   - React + FastAPI application
#
# DEPLOYMENT:
#   1. Set warehouse_id and catalog in targets.dev.variables below
#   2. Set catalog in app.yaml
#   3. databricks bundle deploy -t dev
#   4. databricks bundle run logistics_setup -t dev  (~10 min)
#   5. databricks bundle run logistics_streaming_refresh -t dev
#   6. Add genie_space_id + ka_endpoint from Step 4 output to targets.dev.variables
#   7. Add "include: - resources/app.yml" to this file
#   8. databricks bundle deploy -t dev
#   9. databricks bundle run logistics_app_permissions -t dev
#
# See SETUP.md for detailed instructions.
# =============================================================================

bundle:
  name: logistics-control-center

include:
  - resources/app.yml

sync:
  exclude:
    - "_archive/**"
    - ".local/**"
    - ".git/**"
    - ".gitignore"
    - ".databricks/**"
    - "node_modules/**"
    - "dist/**"
    - "*.md"
    - "*.png"
    - "*.mmd"
    - "env.example"

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

# =============================================================================
# VARIABLES - Update these once, then deploy
# =============================================================================
variables:
  warehouse_id:
    description: SQL Warehouse ID for running queries and SQL tasks
    default: "<YOUR_WAREHOUSE_ID>"
  catalog:
    description: Unity Catalog catalog name (you must have CREATE SCHEMA permission)
    default: "<YOUR_CATALOG>"
  schema:
    description: Schema name for logistics tables (will be created if not exists)
    default: "logistics_control_center"
  genie_space_id:
    description: Genie Space ID (add after running setup job)
    default: ""
  ka_endpoint:
    description: Knowledge Assistant endpoint name (add after running setup job)
    default: ""
  supervisor_endpoint:
    description: Multi-agent supervisor endpoint (optional)
    default: ""

# =============================================================================
# TARGETS - Configure your workspace here
# =============================================================================
targets:
  dev:
    mode: development
    default: true
    workspace:
      # Use DEFAULT when deploying from Databricks workspace
      # Change to your CLI profile name if deploying from local machine
      profile: DEFAULT
    variables:
      # ┌─────────────────────────────────────────────────────────────────────┐
      # │ STEP 2: Replace these with your workspace values                   │
      # └─────────────────────────────────────────────────────────────────────┘
      warehouse_id: "94565ba1e601c81a"           # SQL Warehouses → Copy ID
      catalog: "akrishn_fe_dsa"                  # Your Unity Catalog name
      schema: "logistics_control_center"
      # ┌─────────────────────────────────────────────────────────────────────┐
      # │ STEP 5: Add these AFTER running 'logistics_setup' job              │
      # └─────────────────────────────────────────────────────────────────────┘
      genie_space_id: "01f12f64ff5a11f190703605380458ca"  # From setup job output
      ka_endpoint: "ka-fb9c590c-endpoint"              # From setup job output

# =============================================================================
# RESOURCES - Infrastructure (pipeline + jobs)
# =============================================================================
# The Databricks App is defined in resources/app.yml and is included in Step 5
# after the setup job has created the Genie Space and Knowledge Assistant.
# =============================================================================
resources:
  # ---------------------------------------------------------------------------
  # STREAMING PIPELINE - Bronze/Silver/Gold
  # ---------------------------------------------------------------------------
  pipelines:
    logistics_streaming_pipeline:
      name: logistics-control-center-streaming
      catalog: ${var.catalog}
      schema: ${var.schema}
      development: true
      channel: CURRENT
      continuous: false
      serverless: true
      configuration:
        catalog: ${var.catalog}
        schema: ${var.schema}
      libraries:
        - file:
            path: databricks/pipelines/01_bronze.sql
        - file:
            path: databricks/pipelines/02_silver.sql
        - file:
            path: databricks/pipelines/03_gold.sql

  # ---------------------------------------------------------------------------
  # JOBS
  # ---------------------------------------------------------------------------
  jobs:
    # Setup job - creates data, tables, and agents
    logistics_setup:
      name: logistics-control-center-setup
      max_concurrent_runs: 1
      timeout_seconds: 3600
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
      tasks:
        - task_key: create_foundation
          description: Create schema, volumes, and serving/raw tables
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: databricks/notebooks/setup_tables.sql
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: generate_synthetic_data
          description: Seed synthetic logistics data and raw event files
          depends_on:
            - task_key: create_foundation
          notebook_task:
            notebook_path: databricks/notebooks/generate_synthetic_data.ipynb
            source: WORKSPACE

        - task_key: run_pipeline_update
          description: Run pipeline to process raw events into gold views
          depends_on:
            - task_key: generate_synthetic_data
          pipeline_task:
            pipeline_id: ${resources.pipelines.logistics_streaming_pipeline.id}

        - task_key: refresh_serving_tables
          description: Sync gold outputs to serving Delta tables
          depends_on:
            - task_key: run_pipeline_update
          notebook_task:
            notebook_path: databricks/notebooks/refresh_serving_tables.ipynb
            source: WORKSPACE

        - task_key: create_helper_metric_views
          description: Create helper and metric views for Genie/backend
          depends_on:
            - task_key: refresh_serving_tables
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: databricks/notebooks/create_helper_metric_views.sql
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: generate_documents
          description: Generate synthetic KA documents in UC volume
          depends_on:
            - task_key: create_foundation
          notebook_task:
            notebook_path: databricks/notebooks/generate_documents.ipynb
            source: WORKSPACE

        - task_key: reroute_optimization_seed
          description: Generate initial reroute candidates
          depends_on:
            - task_key: refresh_serving_tables
          notebook_task:
            notebook_path: databricks/notebooks/run_reroute_optimization.ipynb
            source: WORKSPACE

        - task_key: create_genie_space
          description: Create or update Genie space from metric views
          depends_on:
            - task_key: create_helper_metric_views
          notebook_task:
            notebook_path: databricks/notebooks/create_genie_space.ipynb
            source: WORKSPACE

        - task_key: create_knowledge_assistant
          description: Create or update Knowledge Assistant from generated docs
          depends_on:
            - task_key: generate_documents
          notebook_task:
            notebook_path: databricks/notebooks/create_knowledge_assistant.ipynb
            source: WORKSPACE

    # Streaming refresh job - scheduled data updates
    logistics_streaming_refresh:
      name: logistics-control-center-streaming-refresh
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 */5 * * * ?"
        timezone_id: "UTC"
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
      tasks:
        - task_key: append_raw_events
          description: Append incremental events to UC volume landing zones
          notebook_task:
            notebook_path: databricks/notebooks/stream_events_to_volume.ipynb
            source: WORKSPACE

        - task_key: run_pipeline_update
          description: Trigger declarative pipeline update
          depends_on:
            - task_key: append_raw_events
          pipeline_task:
            pipeline_id: ${resources.pipelines.logistics_streaming_pipeline.id}

        - task_key: refresh_serving_tables
          description: Sync gold outputs to serving Delta tables
          depends_on:
            - task_key: run_pipeline_update
          notebook_task:
            notebook_path: databricks/notebooks/refresh_serving_tables.ipynb
            source: WORKSPACE

        - task_key: reroute_optimization_refresh
          description: Refresh reroute suggestions from current incident/capacity state
          depends_on:
            - task_key: refresh_serving_tables
          notebook_task:
            notebook_path: databricks/notebooks/run_reroute_optimization.ipynb
            source: WORKSPACE

