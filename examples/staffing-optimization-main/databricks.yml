bundle:
  name: staffing-optimization
  git:
    origin_url: https://github.com/josh-melton_data/staffing-optimization
    branch: main

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

# Sync built artifacts
sync:
  include:
    - .build
    - notebooks

# Build the app before deployment
artifacts:
  default:
    build: PYTHONPATH=src uv run apx build

# Variables for customization
variables:
  default_catalog:
    description: "Unity Catalog catalog name (must exist). Required."
    default: demos
  default_schema:
    description: "Schema for optimization data and results"
    default: staffing_optimization
  lakebase_project_display_name:
    description: "Display name for the Lakebase project (used for app state)"
    default: staffing-optimization

resources:
  # SQL warehouse for app SQL execution and data operations
  sql_warehouses:
    staffing_warehouse:
      name: "staffing-optimization-warehouse"
      cluster_size: Small
      enable_serverless_compute: true
      max_num_clusters: 2
      min_num_clusters: 1
      auto_stop_mins: 60
      warehouse_type: PRO

  # Lakebase PostgreSQL for app state (configs, runs).
  # Project creation auto-provisions a default branch with a read-write endpoint.
  # App uses SDK credential flow and resolves project by display name.
  postgres_projects:
    staffing_db:
      project_id: staffing-optimization-db
      display_name: ${var.lakebase_project_display_name}
      pg_version: 17

  # Main Databricks App
  apps:
    staffing-optimization-app:
      name: "staffing-optimization"
      description: "Workforce Optimization using NVIDIA cuOpt"
      source_code_path: ./.build
      resources:
        - name: app-job
          job:
            id: ${resources.jobs.workforce_optimization_job.id}
            permission: CAN_MANAGE_RUN
        - name: app-warehouse
          sql_warehouse:
            id: ${resources.sql_warehouses.staffing_warehouse.id}
            permission: CAN_USE
      config:
        command: ["uvicorn", "staffing_optimization.backend.app:app", "--workers", "2"]
        env:
          - name: STAFFING_OPTIMIZATION_DEBUG
            value: "false"
          - name: STAFFING_OPTIMIZATION_DEFAULT_CATALOG
            value: ${var.default_catalog}
          - name: STAFFING_OPTIMIZATION_DEFAULT_SCHEMA
            value: ${var.default_schema}
          - name: STAFFING_OPTIMIZATION_DATABRICKS_JOB_ID
            value_from: "app-job"
          - name: DATABRICKS_SQL_WAREHOUSE_ID
            value_from: "app-warehouse"
          - name: STAFFING_OPTIMIZATION_LAKEBASE_PROJECT
            value: ${var.lakebase_project_display_name}

  # Serverless GPU Job for running optimizations
  jobs:
    workforce_optimization_job:
      name: "Workforce Optimization - Serverless GPU"
      description: "Run workforce optimization using cuOpt on serverless GPU"
      permissions:
        - level: CAN_VIEW
          group_name: users
        - level: CAN_MANAGE_RUN
          service_principal_name: ${resources.apps.staffing-optimization-app.service_principal_client_id}

      # Job parameters (passed at run time via run_now)
      parameters:
        - name: run_id
          default: ""
        - name: config_json
          default: "{}"
        - name: results_table
          default: ""
        - name: owner_user
          default: ""

      # Run on serverless GPU compute
      tasks:
        - task_key: run_optimization
          notebook_task:
            notebook_path: ${workspace.root_path}/files/notebooks/run_optimization
            source: WORKSPACE
            base_parameters:
              config_json: "{{job.parameters.config_json}}"
              run_id: "{{job.parameters.run_id}}"
              results_table: "{{job.parameters.results_table}}"
              owner_user: "{{job.parameters.owner_user}}"

          environment_key: Default

      # Email notifications on failure
      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}

      # Job settings
      max_concurrent_runs: 5

      # Custom environments for serverless
      environments:
        - environment_key: Default
          spec:
            client: "4"
            dependencies:
              - cuopt-server-cu12
              - cuopt-sh-client
              - cuopt-cu12==25.8.0

  # Schema for workforce optimization data
  schemas:
    staffing_optimization_schema:
      name: ${var.default_schema}
      catalog_name: ${var.default_catalog}
      comment: "Schema for workforce optimization data and results"
      grants:
        - principal: ${resources.apps.staffing-optimization-app.service_principal_client_id}
          privileges:
            - USE_SCHEMA
            - SELECT

# Deployment targets
targets:
  # Development environment
  dev:
    mode: production
    default: true
    presets:
      tags:
        RemoveAfter: "2027-01-01"
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      default_catalog: demos
      default_schema: staffing_optimization
      lakebase_project_display_name: staffing-optimization

  # Production environment
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      default_catalog: demos
      default_schema: staffing_optimization
      lakebase_project_display_name: staffing-optimization

    permissions:
      - level: CAN_VIEW
        group_name: users
      - level: CAN_RUN
        group_name: data_scientists
